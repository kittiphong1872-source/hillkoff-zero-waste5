<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILLKOFF GREEN INTELLIGENCE | ENTERPRISE ESG PLATFORM</title>
    
    <!-- External Frameworks -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@100;300;400;500;600;700&display=swap');
        
        :root {
            --hk-dark: #022c22;
            --hk-primary: #10b981;
            --hk-secondary: #064e3b;
            --hk-accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Anuphan', sans-serif;
            background-color: var(--hk-dark);
            color: #ecfdf5;
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Styling */
        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        .glass-nav {
            background: rgba(2, 44, 34, 0.9);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--glass-border);
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #065f46, #022c22);
            position: relative;
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }

        /* Custom Scrollbar */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .active-tab-indicator {
            color: var(--hk-primary);
            position: relative;
        }
        .active-tab-indicator::after {
            content: '';
            position: absolute;
            top: -12px;
            width: 24px;
            height: 4px;
            background: var(--hk-primary);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--hk-primary);
        }

        input:focus, select:focus {
            border-color: var(--hk-primary) !important;
            box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
        }

        .carbon-hero-gradient {
            background: linear-gradient(135deg, #10b981 0%, #064e3b 100%);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- GLOBAL CONFIGURATION ---
        const BRANCHES = [
            { id: 'HQ', name: 'สำนักงานใหญ่', icon: '🏢' },
            { id: 'CP', name: 'สาขาช้างเผือก', icon: '🐘' },
            { id: 'MH', name: 'สาขามหิดล', icon: '🎓' },
            { id: 'PP', name: 'สาขาป่าแพ่ง', icon: '🌿' },
            { id: 'RT', name: 'สาขาราติก้า', icon: '☕' }
        ];

        const WASTE_TYPES = {
            coffee: { name: 'กากกาแฟ', factor: 0.51, unit: 'kg', icon: '☕', color: '#78350f' },
            plastic: { name: 'พลาสติก', factor: 2.52, unit: 'kg', icon: '🥤', color: '#2563eb' },
            paper: { name: 'กระดาษ', factor: 1.58, unit: 'kg', icon: '📄', color: '#d97706' },
            food: { name: 'เศษอาหาร', factor: 0.19, unit: 'kg', icon: '🍎', color: '#dc2626' }
        };

        // --- UTILITY FUNCTIONS ---
        const calculateCarbon = (weight, type) => (weight * WASTE_TYPES[type].factor).toFixed(2);
        
        const getLocalStorage = (key, defaultValue) => {
            const saved = localStorage.getItem(key);
            return saved ? JSON.parse(saved) : defaultValue;
        };

        // --- MAIN APPLICATION COMPONENT ---
        const App = () => {
            const [user, setUser] = useState(() => getLocalStorage('hk_user_session', null));
            const [activeTab, setActiveTab] = useState('home');
            const [logs, setLogs] = useState(() => getLocalStorage('hk_waste_logs', []));

            // Sync User to LocalStorage
            useEffect(() => {
                if (user) localStorage.setItem('hk_user_session', JSON.stringify(user));
            }, [user]);

            // Sync Logs to LocalStorage
            useEffect(() => {
                localStorage.setItem('hk_waste_logs', JSON.stringify(logs));
            }, [logs]);

            const handleLogin = (loginData) => {
                setUser({
                    ...loginData,
                    points: 1250, // Starting points
                    joinedDate: new Date().toLocaleDateString('th-TH')
                });
            };

            const handleLogout = () => {
                Swal.fire({
                    title: 'ยืนยันการออกจากระบบ?',
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonColor: '#10b981',
                    cancelButtonColor: '#374151',
                    background: '#022c22',
                    color: '#fff'
                }).then((result) => {
                    if (result.isConfirmed) {
                        localStorage.removeItem('hk_user_session');
                        setUser(null);
                    }
                });
            };

            const addNewLog = (entry) => {
                const newLog = {
                    ...entry,
                    id: Date.now(),
                    timestamp: new Date().toLocaleString('th-TH'),
                    userName: user.name,
                    branch: user.branch
                };
                setLogs(prev => [newLog, ...prev]);
            };

            if (!user) return <LoginPage onLogin={handleLogin} />;

            return (
                <div className="app-container flex flex-col shadow-2xl">
                    {/* Header */}
                    <header className="p-6 flex justify-between items-center z-10">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 bg-emerald-500 rounded-xl flex items-center justify-center shadow-lg shadow-emerald-500/20">
                                <i className="fas fa-leaf text-emerald-950 text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-black uppercase tracking-tighter leading-none">Hillkoff</h1>
                                <p className="text-[9px] font-bold text-emerald-500 tracking-[0.2em] uppercase">Intelligence</p>
                            </div>
                        </div>
                        <button onClick={handleLogout} className="w-10 h-10 glass-card rounded-xl flex items-center justify-center text-red-400">
                            <i className="fas fa-power-off text-sm"></i>
                        </button>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 overflow-y-auto no-scrollbar pb-32">
                        {activeTab === 'home' && <HomeView user={user} logs={logs} />}
                        {activeTab === 'record' && <RecordView user={user} onSave={addNewLog} onComplete={() => setActiveTab('home')} />}
                        {activeTab === 'analytics' && <AnalyticsView logs={logs} user={user} />}
                        {activeTab === 'rank' && <RankingView logs={logs} user={user} />}
                        {activeTab === 'social' && <SocialView user={user} />}
                        {activeTab === 'policy' && <PolicyView />}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-0 left-0 right-0 glass-nav h-24 flex justify-around items-center px-4 z-50 rounded-t-[2.5rem]">
                        <NavButton id="home" icon="fa-home" label="Home" activeTab={activeTab} onClick={setActiveTab} />
                        <NavButton id="record" icon="fa-plus-circle" label="Record" activeTab={activeTab} onClick={setActiveTab} />
                        <NavButton id="analytics" icon="fa-chart-pie" label="ESG" activeTab={activeTab} onClick={setActiveTab} />
                        <NavButton id="rank" icon="fa-award" label="Rank" activeTab={activeTab} onClick={setActiveTab} />
                        <NavButton id="social" icon="fa-comments" label="Social" activeTab={activeTab} onClick={setActiveTab} />
                        <NavButton id="policy" icon="fa-shield-halved" label="Policy" activeTab={activeTab} onClick={setActiveTab} />
                    </nav>
                </div>
            );
        };

        // --- SUB-COMPONENTS ---

        const NavButton = ({ id, icon, label, activeTab, onClick }) => {
            const isActive = activeTab === id;
            return (
                <button onClick={() => onClick(id)} className={`flex flex-col items-center gap-1 transition-all duration-300 ${isActive ? 'active-tab-indicator scale-110' : 'opacity-30'}`}>
                    <i className={`fas ${icon} ${isActive ? 'text-xl' : 'text-lg'}`}></i>
                    <span className="text-[8px] font-black uppercase tracking-widest">{label}</span>
                </button>
            );
        };

        const LoginPage = ({ onLogin }) => {
            const [formData, setFormData] = useState({ name: '', branch: 'สาขาช้างเผือก' });
            
            const submitForm = (e) => {
                e.preventDefault();
                if (formData.name.trim().length < 2) return Swal.fire('กรุณาระบุชื่อที่ถูกต้อง', '', 'warning');
                onLogin(formData);
            };

            return (
                <div className="app-container flex flex-col items-center justify-center p-8 animate-fade">
                    <div className="mb-12 text-center">
                        <div className="w-24 h-24 bg-white rounded-[2.5rem] mx-auto mb-6 flex items-center justify-center shadow-2xl rotate-3">
                            <img src="https://raw.githubusercontent.com/HillkoffZeroWaste/02/main/logo.png" className="w-16 h-16 object-contain" onError={(e) => e.target.src='☕'} />
                        </div>
                        <h2 className="text-3xl font-black mb-1 uppercase tracking-tighter">ยินดีต้อนรับ</h2>
                        <p className="text-emerald-400 text-xs font-bold uppercase tracking-widest">Hillkoff Green Community</p>
                    </div>

                    <form onSubmit={submitForm} className="w-full space-y-4">
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase opacity-50 ml-4 tracking-widest">Nickname / Employee ID</label>
                            <input 
                                required
                                value={formData.name}
                                onChange={(e) => setFormData({...formData, name: e.target.value})}
                                placeholder="ระบุชื่อเล่นหรือรหัสพนักงาน" 
                                className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none text-white font-bold" 
                            />
                        </div>
                        <div className="space-y-1">
                            <label className="text-[10px] font-bold uppercase opacity-50 ml-4 tracking-widest">Work Branch</label>
                            <select 
                                value={formData.branch}
                                onChange={(e) => setFormData({...formData, branch: e.target.value})}
                                className="w-full bg-white/5 border border-white/10 p-5 rounded-3xl outline-none appearance-none font-bold"
                            >
                                {BRANCHES.map(b => <option key={b.id} value={b.name} className="text-emerald-900">{b.name}</option>)}
                            </select>
                        </div>
                        <button type="submit" className="w-full bg-emerald-500 hover:bg-emerald-400 py-5 rounded-3xl text-emerald-950 font-black text-lg shadow-xl shadow-emerald-500/20 transition-all active:scale-95">
                            เริ่มสร้างโลกสีเขียว
                        </button>
                    </form>
                    <p className="mt-12 text-[10px] opacity-30 uppercase tracking-[0.3em]">Enterprise ESG Management System</p>
                </div>
            );
        };

        const HomeView = ({ user, logs }) => {
            const myLogs = useMemo(() => logs.filter(l => l.userName === user.name), [logs, user.name]);
            const totalCarbon = useMemo(() => myLogs.reduce((acc, curr) => acc + parseFloat(curr.carbon), 0).toFixed(2), [myLogs]);
            const totalPoints = useMemo(() => user.points + myLogs.reduce((acc, curr) => acc + curr.points, 0), [myLogs, user.points]);

            return (
                <div className="p-6 space-y-8 animate-fade">
                    <div className="flex justify-between items-center">
                        <div className="flex items-center gap-3">
                            <div className="w-12 h-12 rounded-2xl bg-emerald-500/10 border border-emerald-500/20 p-1">
                                <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=${user.name}`} className="rounded-xl" />
                            </div>
                            <div>
                                <h3 className="font-bold text-lg leading-none">{user.name}</h3>
                                <p className="text-[10px] text-emerald-500 font-bold uppercase tracking-tighter mt-1">{user.branch}</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[8px] opacity-40 uppercase font-bold tracking-widest leading-none mb-1">Joined Since</p>
                            <p className="text-[10px] font-bold">{user.joinedDate}</p>
                        </div>
                    </div>

                    <div className="carbon-hero-gradient rounded-[3rem] p-8 text-white relative shadow-2xl overflow-hidden">
                        <div className="relative z-10">
                            <div className="flex items-center gap-2 mb-2 opacity-80">
                                <i className="fas fa-leaf text-xs"></i>
                                <span className="text-[10px] font-bold uppercase tracking-[0.2em]">Carbon Reduction Effect</span>
                            </div>
                            <h2 className="text-7xl font-black mb-4 tracking-tighter leading-none">
                                {totalCarbon} <span className="text-xl font-normal opacity-70">kgCO₂e</span>
                            </h2>
                            <div className="flex justify-between items-end">
                                <div className="bg-emerald-950/30 backdrop-blur-md px-4 py-2 rounded-2xl border border-white/10">
                                    <p className="text-[9px] opacity-70 uppercase font-bold mb-1">Green Balance</p>
                                    <div className="font-black text-sm">✨ {totalPoints.toLocaleString()} Points</div>
                                </div>
                                <div className="text-right">
                                    <p className="text-[9px] opacity-70 uppercase font-bold mb-1">Trees Equivalent</p>
                                    <div className="flex gap-1 justify-end">
                                        {Array.from({length: Math.min(Math.ceil(totalCarbon/10), 5)}).map((_, i) => (
                                            <i key={i} className="fas fa-tree text-emerald-300 text-[10px]"></i>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div className="absolute -top-10 -right-10 w-48 h-48 bg-white/10 rounded-full blur-3xl"></div>
                        <div className="absolute -bottom-20 -left-10 w-64 h-64 bg-emerald-400/20 rounded-full blur-3xl"></div>
                    </div>

                    <div className="space-y-4">
                        <div className="flex justify-between items-center px-2">
                            <h4 className="text-xs font-black uppercase tracking-[0.2em] flex items-center gap-2">
                                <span className="w-1.5 h-4 bg-emerald-500 rounded-full"></span>
                                Recent Activity
                            </h4>
                            <span className="text-[9px] font-bold text-emerald-500 opacity-60 uppercase">View All</span>
                        </div>
                        
                        <div className="space-y-3">
                            {myLogs.length === 0 ? (
                                <div className="glass-card p-10 rounded-[2.5rem] text-center opacity-40">
                                    <i className="fas fa-box-open text-3xl mb-3 block"></i>
                                    <p className="text-xs font-bold uppercase tracking-widest">ยังไม่มีประวัติการบันทึก</p>
                                </div>
                            ) : (
                                myLogs.slice(0, 5).map(log => (
                                    <div key={log.id} className="glass-card p-5 rounded-[2rem] flex justify-between items-center active:bg-white/5 transition-all">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center text-2xl shadow-inner">
                                                {WASTE_TYPES[log.type].icon}
                                            </div>
                                            <div>
                                                <h5 className="text-sm font-bold">{WASTE_TYPES[log.type].name}</h5>
                                                <p className="text-[9px] opacity-40 font-bold uppercase tracking-tighter">{log.timestamp}</p>
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-sm font-black text-emerald-400">-{log.carbon} <span className="text-[9px] font-normal">kg</span></p>
                                            <p className="text-[8px] bg-emerald-500/10 text-emerald-500 px-2 py-0.5 rounded-full font-bold inline-block">+{log.points} pts</p>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        const RecordView = ({ user, onSave, onComplete }) => {
            const [step, setStep] = useState(1);
            const [selectedType, setSelectedType] = useState('coffee');
            const [weight, setWeight] = useState('');
            const [isSaving, setIsSaving] = useState(false);

            const handleFinalSave = () => {
                if (!weight || weight <= 0) return Swal.fire('กรุณาระบุน้ำหนักที่ถูกต้อง', '', 'warning');
                
                setIsSaving(true);
                const carbon = calculateCarbon(weight, selectedType);
                const points = Math.floor(weight * 10);

                setTimeout(() => {
                    onSave({
                        type: selectedType,
                        weight: parseFloat(weight),
                        carbon: carbon,
                        points: points
                    });
                    
                    Swal.fire({
                        title: 'บันทึกสำเร็จ!',
                        html: `<div class="text-xs">สาขา ${user.branch} ลดคาร์บอนเพิ่ม <b>${carbon} kg</b></div>`,
                        icon: 'success',
                        background: '#022c22',
                        color: '#fff',
                        confirmButtonColor: '#10b981'
                    });
                    setIsSaving(false);
                    onComplete();
                }, 1200);
            };

            return (
                <div className="p-6 space-y-8 animate-fade">
                    <header className="mb-2">
                        <h2 className="text-2xl font-black uppercase">บันทึกข้อมูล</h2>
                        <p className="text-emerald-400/60 text-[10px] font-bold tracking-[0.2em] uppercase">Add New Waste Entry</p>
                    </header>

                    {/* Step 1: Select Type */}
                    <div className="space-y-4">
                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-40 ml-2">1. เลือกประเภทขยะ</p>
                        <div className="grid grid-cols-2 gap-3">
                            {Object.entries(WASTE_TYPES).map(([key, val]) => (
                                <button 
                                    key={key}
                                    onClick={() => setSelectedType(key)}
                                    className={`p-5 rounded-[2rem] flex items-center gap-4 border-2 transition-all ${selectedType === key ? 'border-emerald-500 bg-emerald-500/10 scale-105' : 'border-white/5 bg-white/5 opacity-50'}`}
                                >
                                    <span className="text-2xl">{val.icon}</span>
                                    <span className="text-xs font-bold uppercase tracking-wider">{val.name}</span>
                                </button>
                            ))}
                        </div>
                    </div>

                    {/* Step 2: Weight Input */}
                    <div className="space-y-4">
                        <p className="text-[10px] font-bold uppercase tracking-widest opacity-40 ml-2">2. ระบุน้ำหนัก (กิโลกรัม)</p>
                        <div className="relative">
                            <input 
                                type="number" 
                                value={weight}
                                onChange={(e) => setWeight(e.target.value)}
                                placeholder="0.00" 
                                className="w-full bg-white/5 border-2 border-white/10 p-10 rounded-[3rem] text-6xl font-black text-center text-emerald-400 outline-none focus:border-emerald-500 transition-all" 
                            />
                            <div className="absolute right-10 top-1/2 -translate-y-1/2 text-xl font-bold opacity-20 uppercase">KG</div>
                        </div>
                    </div>

                    {/* Live Preview Card */}
                    {weight > 0 && (
                        <div className="glass-card p-6 rounded-[2.5rem] border-emerald-500/20 border-2 animate-fade">
                            <div className="flex justify-between items-center mb-4 pb-4 border-b border-white/10">
                                <div className="text-[10px] font-bold uppercase opacity-40 tracking-widest">Environmental Impact</div>
                                <div className="text-emerald-500 text-[10px] font-bold uppercase tracking-widest">Preview</div>
                            </div>
                            <div className="grid grid-cols-2 gap-6">
                                <div>
                                    <p className="text-[9px] font-bold opacity-40 uppercase mb-1 tracking-tighter">Carbon Reduction</p>
                                    <p className="text-2xl font-black">{calculateCarbon(weight, selectedType)} <span className="text-[10px] font-normal opacity-50">kg</span></p>
                                </div>
                                <div>
                                    <p className="text-[9px] font-bold opacity-40 uppercase mb-1 tracking-tighter">Points to Earn</p>
                                    <p className="text-2xl font-black text-yellow-400">+{Math.floor(weight * 10)} <span className="text-[10px] font-normal opacity-50">PTS</span></p>
                                </div>
                            </div>
                        </div>
                    )}

                    <button 
                        onClick={handleFinalSave}
                        disabled={isSaving || !weight}
                        className="w-full bg-emerald-500 disabled:opacity-30 py-6 rounded-[2.5rem] text-emerald-950 font-black text-xl shadow-xl shadow-emerald-500/30 transition-all active:scale-95 flex items-center justify-center gap-3"
                    >
                        {isSaving ? <i className="fas fa-circle-notch animate-spin"></i> : <i className="fas fa-check-circle"></i>}
                        ยืนยันการบันทึกข้อมูล
                    </button>
                </div>
            );
        };

        const AnalyticsView = ({ logs, user }) => {
            const chartRef = useRef(null);

            // คำนวณข้อมูลสำหรับรายงาน
            const stats = useMemo(() => {
                const totalC = logs.reduce((acc, curr) => acc + parseFloat(curr.carbon), 0);
                const myC = logs.filter(l => l.userName === user.name).reduce((acc, curr) => acc + parseFloat(curr.carbon), 0);
                const branchC = logs.filter(l => l.branch === user.branch).reduce((acc, curr) => acc + parseFloat(curr.carbon), 0);
                
                return { 
                    total: totalC.toFixed(1), 
                    personal: myC.toFixed(1), 
                    branch: branchC.toFixed(1),
                    wasteShare: Object.keys(WASTE_TYPES).map(type => ({
                        type,
                        weight: logs.filter(l => l.type === type).reduce((acc, curr) => acc + curr.weight, 0)
                    }))
                };
            }, [logs, user]);

            useEffect(() => {
                if (chartRef.current && logs.length > 0) {
                    const ctx = chartRef.current.getContext('2d');
                    new Chart(ctx, {
                        type: 'doughnut',
                        data: {
                            labels: stats.wasteShare.map(s => WASTE_TYPES[s.type].name),
                            datasets: [{
                                data: stats.wasteShare.map(s => s.weight),
                                backgroundColor: stats.wasteShare.map(s => WASTE_TYPES[s.type].color),
                                borderWidth: 0,
                                hoverOffset: 10
                            }]
                        },
                        options: {
                            plugins: { 
                                legend: { 
                                    position: 'bottom', 
                                    labels: { color: 'white', font: { family: 'Anuphan', size: 10 }, padding: 20 } 
                                } 
                            },
                            cutout: '75%',
                            maintainAspectRatio: false
                        }
                    });
                }
            }, [stats, logs.length]);

            return (
                <div className="p-6 space-y-8 animate-fade">
                    <header>
                        <h2 className="text-2xl font-black uppercase">ESG Analytics</h2>
                        <p className="text-emerald-400/60 text-[10px] font-bold tracking-[0.2em] uppercase">Corporate Sustainability Stats</p>
                    </header>

                    <div className="grid grid-cols-2 gap-4">
                        <div className="glass-card p-5 rounded-[2rem] border-l-4 border-emerald-500">
                            <p className="text-[9px] font-bold opacity-40 uppercase mb-1 tracking-widest">Branch Impact</p>
                            <h4 className="text-xl font-black text-emerald-400">{stats.branch} <span className="text-[10px] text-white opacity-40">kg</span></h4>
                            <p className="text-[8px] opacity-30 uppercase font-bold mt-1">From {user.branch}</p>
                        </div>
                        <div className="glass-card p-5 rounded-[2rem] border-l-4 border-blue-500">
                            <p className="text-[9px] font-bold opacity-40 uppercase mb-1 tracking-widest">Platform Total</p>
                            <h4 className="text-xl font-black text-blue-400">{stats.total} <span className="text-[10px] text-white opacity-40">kg</span></h4>
                            <p className="text-[8px] opacity-30 uppercase font-bold mt-1">All Hillkoff Branches</p>
                        </div>
                    </div>

                    <div className="glass-card p-8 rounded-[3rem] relative">
                        <h4 className="text-xs font-black uppercase tracking-[0.2em] mb-8 text-center opacity-60">Waste Collection Mix</h4>
                        <div className="h-56 w-full relative">
                            {logs.length > 0 ? (
                                <canvas ref={chartRef}></canvas>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center opacity-20">
                                    <i className="fas fa-chart-pie text-5xl mb-2"></i>
                                    <p className="text-[10px] font-bold uppercase tracking-[0.3em]">No Data to Plot</p>
                                </div>
                            )}
                            <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-center pointer-events-none">
                                <p className="text-[8px] font-bold opacity-40 uppercase tracking-widest leading-none mb-1">Total</p>
                                <p className="text-xl font-black leading-none">{stats.wasteShare.reduce((a,c) => a + c.weight, 0).toFixed(0)}</p>
                                <p className="text-[8px] font-bold opacity-40 uppercase tracking-widest">KG</p>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <h4 className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 ml-2">Impact Standard Certificates</h4>
                        <div className="space-y-2">
                            {['ISO 14064-1 Carbon Footprint', 'GHG Protocol Certified', 'Zero Waste to Landfill'].map((cert, idx) => (
                                <div key={idx} className="glass-card p-4 rounded-2xl flex items-center gap-4 group transition-all">
                                    <div className="w-8 h-8 rounded-lg bg-emerald-500/10 flex items-center justify-center text-emerald-500">
                                        <i className="fas fa-award"></i>
                                    </div>
                                    <span className="text-[10px] font-bold uppercase tracking-wider flex-1">{cert}</span>
                                    <i className="fas fa-check-circle text-emerald-500 opacity-0 group-hover:opacity-100 transition-opacity"></i>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        };

        const RankingView = ({ logs, user }) => {
            // คำนวณอันดับตามพนักงาน
            const rankings = useMemo(() => {
                const userTotals = logs.reduce((acc, log) => {
                    if (!acc[log.userName]) {
                        acc[log.userName] = { name: log.userName, branch: log.branch, pts: 0, carbon: 0 };
                    }
                    acc[log.userName].pts += log.points;
                    acc[log.userName].carbon += parseFloat(log.carbon);
                    return acc;
                }, {});
                
                return Object.values(userTotals).sort((a, b) => b.pts - a.pts);
            }, [logs]);

            return (
                <div className="p-6 space-y-8 animate-fade">
                    <header>
                        <h2 className="text-2xl font-black uppercase">Hall of Green</h2>
                        <p className="text-emerald-400/60 text-[10px] font-bold tracking-[0.2em] uppercase">Sustainability Champions</p>
                    </header>

                    {/* Podium Simulation */}
                    <div className="flex justify-around items-end pt-12 pb-6 relative">
                        {rankings.length >= 2 && (
                            <div className="text-center">
                                <div className="w-16 h-16 rounded-2xl bg-slate-400/20 border-2 border-slate-400/50 p-1 mb-2 relative">
                                    <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=${rankings[1].name}`} className="rounded-xl" />
                                    <div className="absolute -top-3 -left-3 w-8 h-8 bg-slate-400 rounded-full border-4 border-emerald-900 flex items-center justify-center text-xs font-bold text-emerald-950">2</div>
                                </div>
                                <p className="text-[9px] font-bold uppercase truncate w-16 mx-auto">{rankings[1].name}</p>
                            </div>
                        )}
                        {rankings.length >= 1 && (
                            <div className="text-center relative -top-6 scale-125">
                                <div className="w-20 h-20 rounded-[2rem] bg-yellow-400/20 border-2 border-yellow-400 p-1 mb-2 relative">
                                    <i className="fas fa-crown absolute -top-8 left-1/2 -translate-x-1/2 text-2xl text-yellow-400 animate-bounce"></i>
                                    <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=${rankings[0].name}`} className="rounded-[1.5rem]" />
                                    <div className="absolute -top-3 -left-3 w-10 h-10 bg-yellow-400 rounded-full border-4 border-emerald-900 flex items-center justify-center text-sm font-bold text-emerald-950">1</div>
                                </div>
                                <p className="text-[10px] font-black uppercase truncate w-20 mx-auto">{rankings[0].name}</p>
                            </div>
                        )}
                        {rankings.length >= 3 && (
                            <div className="text-center">
                                <div className="w-16 h-16 rounded-2xl bg-amber-700/20 border-2 border-amber-700/50 p-1 mb-2 relative">
                                    <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=${rankings[2].name}`} className="rounded-xl" />
                                    <div className="absolute -top-3 -right-3 w-8 h-8 bg-amber-700 rounded-full border-4 border-emerald-900 flex items-center justify-center text-xs font-bold text-emerald-950">3</div>
                                </div>
                                <p className="text-[9px] font-bold uppercase truncate w-16 mx-auto">{rankings[2].name}</p>
                            </div>
                        )}
                    </div>

                    <div className="space-y-3">
                        {rankings.length === 0 ? (
                            <div className="text-center py-20 opacity-20 font-black uppercase tracking-widest text-xs">No Data Logged Yet</div>
                        ) : (
                            rankings.map((rank, i) => (
                                <div key={i} className={`glass-card p-5 rounded-[2rem] flex items-center gap-5 transition-all ${rank.name === user.name ? 'border-emerald-500 bg-emerald-500/5 ring-1 ring-emerald-500/50 scale-[1.02]' : ''}`}>
                                    <span className="text-xs font-black opacity-30 w-4">{i + 1}</span>
                                    <div className="w-10 h-10 rounded-xl bg-white/5 p-1 flex items-center justify-center">
                                        <img src={`https://api.dicebear.com/7.x/bottts/svg?seed=${rank.name}`} className="rounded-lg" />
                                    </div>
                                    <div className="flex-1">
                                        <h5 className="text-sm font-bold truncate leading-none">{rank.name}</h5>
                                        <p className="text-[9px] font-bold text-emerald-500/60 uppercase tracking-tighter mt-1">{rank.branch}</p>
                                    </div>
                                    <div className="text-right">
                                        <p className="text-sm font-black text-emerald-400">{rank.pts.toLocaleString()}</p>
                                        <p className="text-[8px] opacity-30 uppercase font-bold tracking-tighter leading-none">Total Points</p>
                                    </div>
                                </div>
                            ))
                        )}
                    </div>
                </div>
            );
        };

        const SocialView = ({ user }) => {
            const [msg, setMsg] = useState('');
            const [messages, setMessages] = useState(() => getLocalStorage('hk_chat_msgs', [
                { id: 1, user: 'Admin', branch: 'HQ', text: 'ยินดีต้อนรับชาวฮิลล์คอฟฟ์ทุกท่านเข้าสู่แพลตฟอร์มสีเขียวครับ! 🌱', time: '10:00' },
                { id: 2, user: 'พี่สมชาย', branch: 'ช้างเผือก', text: 'วันนี้พนักงานสาขาช้างเผือกช่วยกันแยกกากกาแฟได้ล๊อตใหญ่เลยครับ 🐘☕', time: '11:15' }
            ]));

            const sendMsg = (e) => {
                e.preventDefault();
                if (!msg.trim()) return;
                const newMsg = {
                    id: Date.now(),
                    user: user.name,
                    branch: user.branch,
                    text: msg,
                    time: new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' })
                };
                const updated = [...messages, newMsg];
                setMessages(updated);
                localStorage.setItem('hk_chat_msgs', JSON.stringify(updated));
                setMsg('');
            };

            return (
                <div className="h-screen flex flex-col pt-6 animate-fade">
                    <header className="px-6 mb-6">
                        <h2 className="text-2xl font-black uppercase">Green Community</h2>
                        <p className="text-emerald-400/60 text-[10px] font-bold tracking-[0.2em] uppercase">Share Your Impact Moments</p>
                    </header>

                    <div className="flex-1 overflow-y-auto px-6 space-y-6 pb-40 no-scrollbar">
                        {messages.map((m) => (
                            <div key={m.id} className={`flex flex-col ${m.user === user.name ? 'items-end' : 'items-start'}`}>
                                <div className={`max-w-[85%] p-4 rounded-3xl shadow-lg relative ${m.user === user.name ? 'bg-emerald-600 rounded-tr-none' : 'glass-card rounded-tl-none border-l-4 border-emerald-500'}`}>
                                    <div className="flex items-center gap-2 mb-1.5 opacity-60">
                                        <span className="text-[9px] font-black uppercase tracking-tighter">{m.user}</span>
                                        <span className="text-[9px] font-bold uppercase tracking-tighter">• {m.branch}</span>
                                    </div>
                                    <p className="text-xs leading-relaxed">{m.text}</p>
                                    <p className="text-[8px] opacity-30 mt-2 text-right uppercase font-bold">{m.time}</p>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-28 left-1/2 -translate-x-1/2 w-full max-w-md px-6 z-40">
                        <form onSubmit={sendMsg} className="glass-card p-2 rounded-full flex items-center gap-2 border-white/20 shadow-2xl backdrop-blur-3xl">
                            <input 
                                value={msg}
                                onChange={(e) => setMsg(e.target.value)}
                                className="flex-1 bg-transparent border-none outline-none text-xs placeholder:text-white/20 px-4 h-12" 
                                placeholder="พิมพ์ข้อความแชร์ความรักษ์โลก..." 
                            />
                            <button type="submit" className="w-12 h-12 bg-emerald-500 rounded-full flex items-center justify-center text-emerald-950 active:scale-90 transition-all">
                                <i className="fas fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        };

        const PolicyView = () => (
            <div className="p-6 space-y-8 animate-fade">
                <header>
                    <h2 className="text-2xl font-black uppercase">Green Strategy</h2>
                    <p className="text-emerald-400/60 text-[10px] font-bold tracking-[0.2em] uppercase">Hillkoff Sustainability Policy</p>
                </header>

                <div className="space-y-4">
                    <div className="glass-card p-8 rounded-[3rem] border-l-4 border-emerald-500 relative overflow-hidden">
                        <i className="fas fa-quote-left absolute top-4 left-4 text-4xl opacity-5"></i>
                        <h4 className="text-sm font-black text-emerald-400 mb-4 uppercase tracking-widest">Our Mission</h4>
                        <p className="text-xs leading-relaxed opacity-70">
                            มุ่งเน้นการเปลี่ยนผ่านสู่เศรษฐกิจหมุนเวียน (Circular Economy) 
                            โดยการจัดการวัสดุเหลือใช้ในห่วงโซ่การผลิตกาแฟอย่างยั่งยืน 
                            ลดการปล่อยก๊าซเรือนกระจกสู่ Net Zero ภายในปี 2030
                        </p>
                    </div>

                    <div className="space-y-4">
                        <h4 className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 ml-2">Recent Success Cases</h4>
                        <div className="glass-card p-6 rounded-[2.5rem] flex items-center gap-5 border-l-4 border-blue-500">
                            <div className="text-3xl">📦</div>
                            <div>
                                <h5 className="text-xs font-black uppercase leading-tight mb-1">Sustainable Packaging</h5>
                                <p className="text-[10px] opacity-60">สาขาช้างเผือก: เปลี่ยน Bubble Wrap เป็นกระดาษรังผึ้งรีไซเคิล 100%</p>
                            </div>
                        </div>
                        <div className="glass-card p-6 rounded-[2.5rem] flex items-center gap-5 border-l-4 border-yellow-500">
                            <div className="text-3xl">♻️</div>
                            <div>
                                <h5 className="text-xs font-black uppercase leading-tight mb-1">Coffee Grounds Valorization</h5>
                                <p className="text-[10px] opacity-60">แปรรูปกากกาแฟเหลือทิ้งเป็นวัสดุดูดกลิ่นและปุ๋ยชีวภาพ</p>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4 pt-4">
                        <h4 className="text-[10px] font-black uppercase tracking-[0.2em] opacity-40 ml-2">Official Documents</h4>
                        <div className="grid grid-cols-1 gap-2">
                            {['ESG_Report_2026.pdf', 'NetZero_Roadmap.pdf', 'Carbon_Audit_Certificate.xlsx'].map(doc => (
                                <div key={doc} className="glass-card p-4 rounded-2xl flex justify-between items-center group active:scale-95 transition-all">
                                    <div className="flex items-center gap-3">
                                        <i className="fas fa-file-pdf text-emerald-500"></i>
                                        <span className="text-[9px] font-bold opacity-60 uppercase">{doc}</span>
                                    </div>
                                    <i className="fas fa-download text-[10px] text-emerald-500/50"></i>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
