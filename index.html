<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HILLKOFF GREEN INTELLIGENCE PLATFORM</title>
    
    <!-- Tailwind CSS & Plugins -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- React & Chart.js SDKs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/framer-motion@10.16.4/dist/framer-motion.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@300;400;500;600;700&display=swap');
        
        :root {
            --hk-green-dark: #064e3b;
            --hk-green-primary: #059669;
            --hk-green-light: #ecfdf5;
        }

        body {
            font-family: 'Anuphan', sans-serif;
            background-color: #f0fdf4;
            color: #064e3b;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }

        .nav-active {
            color: #059669;
            border-top: 3px solid #059669;
        }

        .gradient-bg {
            background: linear-gradient(135deg, #064e3b 0%, #059669 100%);
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.05);
            z-index: 1000;
        }

        /* สำหรับ Mobile Friendly */
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: #059669;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- MOCK DATA & CONFIG ---
        const BRANCHES = ["สำนักงานใหญ่", "ช้างเผือก", "มหิดล", "ป่าแพ่ง", "ทับเดื่อ", "ราติก้า"];
        const WASTE_TYPES = [
            { id: 'coffee', name: 'กากกาแฟ', factor: 0.5, icon: '☕' },
            { id: 'plastic', name: 'พลาสติก', factor: 2.5, icon: '🥤' },
            { id: 'paper', name: 'กระดาษ', factor: 1.5, icon: '📄' },
            { id: 'food', name: 'เศษอาหาร', factor: 0.8, icon: '🍎' },
            { id: 'glass', name: 'แก้ว', factor: 0.6, icon: '🍾' },
            { id: 'alu', name: 'อะลูมิเนียม', factor: 9.0, icon: '🥫' }
        ];

        // --- COMPONENTS ---

        const Dashboard = ({ data, stats }) => {
            useEffect(() => {
                const ctx = document.getElementById('carbonChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'],
                        datasets: [{
                            label: 'Carbon Saved (kg)',
                            data: [12, 19, 15, 25, 22, 30, 28],
                            borderColor: '#10b981',
                            tension: 0.4,
                            fill: true,
                            backgroundColor: 'rgba(16, 185, 129, 0.1)'
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { display: false } } }
                });
            }, []);

            return (
                <div className="pb-24 animate-in fade-in duration-500">
                    {/* Header Summary */}
                    <div className="gradient-bg p-6 rounded-b-[40px] text-white relative overflow-hidden">
                        <div className="flex justify-between items-center mb-6">
                            <div className="flex items-center gap-2">
                                <div className="bg-white p-2 rounded-full w-10 h-10 flex items-center justify-center">
                                    <span className="text-xl">☕</span>
                                </div>
                                <div>
                                    <h1 className="text-lg font-bold leading-none">Hillkoff</h1>
                                    <p className="text-[10px] opacity-80">Zero Waste · ESG Platform</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-[10px] uppercase opacity-80">CO₂e รวม</p>
                                <p className="text-2xl font-bold">1.26 kg</p>
                            </div>
                        </div>

                        <div className="bg-white/10 backdrop-blur-md rounded-3xl p-6 border border-white/20 text-center mb-4">
                            <p className="text-sm opacity-90 mb-1">🌍 Carbon Footprint — องค์กร</p>
                            <h2 className="text-5xl font-extrabold mb-4">1.26 <span className="text-xl font-normal">kg CO₂e</span></h2>
                            <div className="flex justify-center gap-2 mb-6">
                                {['ISO 14064', 'GHG Protocol', 'WEEE', 'SDG 12'].map(tag => (
                                    <span key={tag} className="text-[10px] bg-white/20 px-2 py-1 rounded-full">{tag}</span>
                                ))}
                            </div>
                            <div className="grid grid-cols-3 gap-2 border-t border-white/10 pt-4">
                                <div>
                                    <p className="text-xl font-bold">1.265</p>
                                    <p className="text-[10px] opacity-70">kg วันนี้</p>
                                </div>
                                <div>
                                    <p className="text-xl font-bold">1.265</p>
                                    <p className="text-[10px] opacity-70">kg เดือนนี้</p>
                                </div>
                                <div>
                                    <p className="text-xl font-bold">1</p>
                                    <p className="text-[10px] opacity-70">รายการ</p>
                                </div>
                            </div>
                        </div>

                        <button className="w-full bg-white text-emerald-900 py-3 rounded-2xl font-bold shadow-lg flex items-center justify-center gap-2 active:scale-95 transition-transform">
                            📝 บันทึกขยะใหม่
                        </button>
                    </div>

                    {/* Branch Summary Section */}
                    <div className="p-4 mt-4">
                        <h3 className="font-bold mb-4 flex justify-between">
                            <span>สรุปแต่ละสาขา</span>
                            <span className="text-emerald-600 text-sm">ดูทั้งหมด</span>
                        </h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                            {BRANCHES.map((name, i) => (
                                <div key={name} className="glass-card p-4 rounded-3xl text-center flex flex-col items-center justify-center border-b-4 border-emerald-500">
                                    <span className="text-3xl mb-2">{['🏢', '🐘', '🎓', '🌿', '🌱', '☕'][i]}</span>
                                    <h4 className="font-bold text-sm">{name}</h4>
                                    <p className="text-[10px] text-gray-500">0 รายการ</p>
                                    <p className="text-emerald-600 font-bold">0 kg</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Performance Chart */}
                    <div className="p-4">
                        <div className="glass-card p-4 rounded-3xl">
                            <h3 className="font-bold mb-4">แนวโน้มการลด Carbon</h3>
                            <canvas id="carbonChart" height="200"></canvas>
                        </div>
                    </div>
                </div>
            );
        };

        const WasteRecorder = ({ user }) => {
            const [step, setStep] = useState(1);
            const [imgPreview, setImgPreview] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [aiResult, setAiResult] = useState(null);

            const handleFile = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setImgPreview(reader.result);
                        analyzeImage();
                    };
                    reader.readAsDataURL(file);
                }
            };

            const analyzeImage = () => {
                setIsAnalyzing(true);
                // Simulate Gemini Vision API
                setTimeout(() => {
                    setAiResult({
                        type: 'Plastic Bottle',
                        confidence: 94,
                        suggestion: 'ควรแยกฝาพลาสติกออกก่อนทิ้ง'
                    });
                    setIsAnalyzing(false);
                    setStep(2);
                }, 2000);
            };

            return (
                <div className="p-6 pb-24">
                    <h2 className="text-2xl font-bold mb-6">บันทึกข้อมูลขยะ</h2>
                    
                    {step === 1 && (
                        <div className="text-center py-12 glass-card rounded-3xl border-dashed border-2 border-emerald-300">
                            <input type="file" id="camera" className="hidden" accept="image/*" onChange={handleFile} />
                            <label htmlFor="camera" className="cursor-pointer">
                                <div className="bg-emerald-100 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <i className="fas fa-camera text-3xl text-emerald-600"></i>
                                </div>
                                <p className="font-bold">ถ่ายรูปขยะ</p>
                                <p className="text-sm text-gray-500 px-8">ระบบ AI จะวิเคราะห์ประเภทขยะให้คุณโดยอัตโนมัติ</p>
                            </label>
                        </div>
                    )}

                    {isAnalyzing && (
                        <div className="text-center py-12">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-600 mx-auto mb-4"></div>
                            <p className="font-bold">Gemini AI กำลังวิเคราะห์รูปภาพ...</p>
                        </div>
                    )}

                    {step === 2 && aiResult && (
                        <div className="animate-in slide-in-from-bottom duration-500">
                            <img src={imgPreview} className="w-full h-48 object-cover rounded-3xl mb-4 shadow-lg" />
                            <div className="bg-emerald-600 text-white p-4 rounded-2xl mb-4 flex items-center justify-between">
                                <div>
                                    <p className="text-xs opacity-80">AI ตรวจพบว่าเป็น</p>
                                    <p className="text-lg font-bold">{aiResult.type}</p>
                                </div>
                                <div className="text-right">
                                    <p className="text-xs opacity-80">ความแม่นยำ</p>
                                    <p className="text-lg font-bold">{aiResult.confidence}%</p>
                                </div>
                            </div>

                            <div className="space-y-4">
                                <div>
                                    <label className="block text-sm font-bold mb-1">น้ำหนัก (kg)</label>
                                    <input type="number" step="0.01" className="w-full p-4 rounded-2xl bg-white border border-emerald-100 shadow-sm" placeholder="0.00" />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold mb-1">สาขา</label>
                                    <select className="w-full p-4 rounded-2xl bg-white border border-emerald-100 shadow-sm">
                                        {BRANCHES.map(b => <option key={b} selected={b === user.branch}>{b}</option>)}
                                    </select>
                                </div>
                                <button onClick={() => alert('บันทึกสำเร็จ!')} className="w-full bg-emerald-700 text-white py-4 rounded-2xl font-bold shadow-lg">
                                    ยืนยันและบันทึกข้อมูล
                                </button>
                                <button onClick={() => setStep(1)} className="w-full py-2 text-gray-500">ถ่ายใหม่</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const Ranking = () => (
            <div className="p-6 pb-24">
                <div className="flex gap-4 mb-6 overflow-x-auto pb-2">
                    <button className="bg-emerald-700 text-white px-6 py-2 rounded-full whitespace-nowrap">อันดับสาขา</button>
                    <button className="bg-white text-emerald-700 px-6 py-2 rounded-full border border-emerald-100 shadow-sm whitespace-nowrap">รายบุคคล</button>
                </div>

                <div className="space-y-3">
                    {BRANCHES.map((name, i) => (
                        <div key={name} className="glass-card p-4 rounded-2xl flex items-center gap-4 border-l-4 border-emerald-500">
                            <div className="text-xl font-bold w-6 text-emerald-800">{i + 1}</div>
                            <div className="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center text-xl">
                                {['🏢', '🐘', '🎓', '🌿', '🌱', '☕'][i]}
                            </div>
                            <div className="flex-1">
                                <h4 className="font-bold">{name}</h4>
                                <div className="w-full bg-gray-100 h-2 rounded-full mt-1">
                                    <div className="bg-emerald-500 h-full rounded-full" style={{width: `${100 - (i*15)}%`}}></div>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="font-bold text-emerald-700">{Math.floor(Math.random() * 500) + 200} pts</p>
                                <p className="text-[10px] text-gray-400">Green Score</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const Community = () => (
            <div className="p-6 pb-24 h-screen flex flex-col">
                <h2 className="text-2xl font-bold mb-4">Green Community</h2>
                <div className="flex-1 overflow-y-auto space-y-4 mb-4">
                    <div className="flex items-start gap-3">
                        <div className="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
                        <div className="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm flex-1">
                            <p className="text-xs font-bold text-blue-600 mb-1">Admin (สำนักงานใหญ่)</p>
                            <p className="text-sm">วันนี้สาขาช้างเผือกลด Carbon ได้เยอะมาก! 👏</p>
                            <div className="mt-2 flex gap-2">
                                <span className="bg-emerald-50 px-2 py-1 rounded-lg text-xs text-emerald-600">🌿 +10 คะแนน</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex items-start gap-3 flex-row-reverse">
                        <div className="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold">U</div>
                        <div className="bg-emerald-600 p-3 rounded-2xl rounded-tr-none shadow-sm flex-1 text-white">
                            <p className="text-xs font-bold opacity-80 mb-1">คุณ (ช้างเผือก)</p>
                            <p className="text-sm">กำลังคัดแยกกากกาแฟครับผม!</p>
                        </div>
                    </div>
                </div>
                <div className="flex gap-2 bg-white p-2 rounded-full shadow-lg">
                    <input className="flex-1 px-4 py-2 outline-none" placeholder="ส่งข้อความสีเขียว..." />
                    <button className="bg-emerald-600 text-white w-10 h-10 rounded-full flex items-center justify-center">
                        <i className="fas fa-paper-plane"></i>
                    </button>
                </div>
            </div>
        );

        const ESGReport = () => (
            <div className="p-6 pb-24">
                <h2 className="text-2xl font-bold mb-6">รายงาน ESG</h2>
                <div className="grid grid-cols-2 gap-4 mb-6">
                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-emerald-50">
                        <p className="text-xs text-gray-500 uppercase">Total Carbon Saved</p>
                        <p className="text-2xl font-bold text-emerald-700">12,450 kg</p>
                    </div>
                    <div className="bg-white p-4 rounded-3xl shadow-sm border border-emerald-50">
                        <p className="text-xs text-gray-500 uppercase">Recycled Waste</p>
                        <p className="text-2xl font-bold text-emerald-700">8.2 Tons</p>
                    </div>
                </div>
                <div className="space-y-4">
                    <div className="glass-card p-4 rounded-2xl flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-file-pdf text-red-500 text-2xl"></i>
                            <div>
                                <h4 className="font-bold">Monthly Summary Report</h4>
                                <p className="text-xs text-gray-400">PDF · May 2026</p>
                            </div>
                        </div>
                        <button className="p-2 text-emerald-600"><i className="fas fa-download"></i></button>
                    </div>
                    <div className="glass-card p-4 rounded-2xl flex items-center justify-between">
                        <div className="flex items-center gap-3">
                            <i className="fas fa-file-csv text-blue-500 text-2xl"></i>
                            <div>
                                <h4 className="font-bold">Raw Waste Data</h4>
                                <p className="text-xs text-gray-400">CSV · All Time</p>
                            </div>
                        </div>
                        <button className="p-2 text-emerald-600"><i className="fas fa-download"></i></button>
                    </div>
                </div>
            </div>
        );

        // --- MAIN APP ---

        const App = () => {
            const [activeTab, setActiveTab] = useState('home');
            const [user, setUser] = useState(null);
            const [showLogin, setShowLogin] = useState(true);

            // Persist User
            useEffect(() => {
                const savedUser = localStorage.getItem('hk_user');
                if (savedUser) {
                    setUser(JSON.parse(savedUser));
                    setShowLogin(false);
                }
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const newUser = {
                    name: formData.get('name'),
                    branch: formData.get('branch'),
                    points: 0
                };
                setUser(newUser);
                localStorage.setItem('hk_user', JSON.stringify(newUser));
                setShowLogin(false);
            };

            if (showLogin) {
                return (
                    <div className="min-h-screen gradient-bg flex items-center justify-center p-6 text-white">
                        <div className="w-full max-w-md animate-in zoom-in duration-500">
                            <div className="text-center mb-8">
                                <div className="bg-white w-20 h-20 rounded-3xl mx-auto mb-4 flex items-center justify-center shadow-2xl rotate-12">
                                    <span className="text-4xl">☕</span>
                                </div>
                                <h1 className="text-2xl font-bold uppercase tracking-widest">Hillkoff</h1>
                                <p className="opacity-70">Green Intelligence Platform</p>
                            </div>
                            
                            <form onSubmit={handleLogin} className="bg-white/10 backdrop-blur-xl p-8 rounded-[40px] border border-white/20 shadow-2xl">
                                <div className="space-y-6">
                                    <div>
                                        <label className="block text-sm opacity-80 mb-2">ชื่อเล่นของคุณ</label>
                                        <input name="name" required className="w-full bg-white/10 border border-white/20 p-4 rounded-2xl outline-none focus:bg-white/20" placeholder="ระบุชื่อ..." />
                                    </div>
                                    <div>
                                        <label className="block text-sm opacity-80 mb-2">สาขาที่ปฏิบัติงาน</label>
                                        <select name="branch" className="w-full bg-white/10 border border-white/20 p-4 rounded-2xl outline-none focus:bg-white/20">
                                            {BRANCHES.map(b => <option key={b} className="text-emerald-900">{b}</option>)}
                                        </select>
                                    </div>
                                    <button type="submit" className="w-full bg-white text-emerald-900 py-4 rounded-2xl font-bold shadow-xl hover:bg-emerald-50 transition-colors">
                                        เข้าใช้งานระบบ
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-md mx-auto min-h-screen bg-emerald-50 relative overflow-hidden">
                    {/* Render Page based on Tab */}
                    {activeTab === 'home' && <Dashboard user={user} />}
                    {activeTab === 'record' && <WasteRecorder user={user} />}
                    {activeTab === 'ranking' && <Ranking />}
                    {activeTab === 'chat' && <Community />}
                    {activeTab === 'report' && <ESGReport />}
                    {activeTab === 'analytics' && <div className="p-6">Analytics Module Loading...</div>}

                    {/* Bottom Navigation (6 Tabs) */}
                    <nav className="bottom-nav safe-area-bottom">
                        <button onClick={() => setActiveTab('home')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'home' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-home text-lg"></i>
                            <span className="text-[10px] font-medium">หน้าหลัก</span>
                        </button>
                        <button onClick={() => setActiveTab('record')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'record' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-file-edit text-lg"></i>
                            <span className="text-[10px] font-medium">บันทึก</span>
                        </button>
                        <button onClick={() => setActiveTab('analytics')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'analytics' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-chart-bar text-lg"></i>
                            <span className="text-[10px] font-medium">สถิติ</span>
                        </button>
                        <button onClick={() => setActiveTab('ranking')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'ranking' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-trophy text-lg"></i>
                            <span className="text-[10px] font-medium">อันดับ</span>
                        </button>
                        <button onClick={() => setActiveTab('chat')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'chat' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-comments text-lg"></i>
                            <span className="text-[10px] font-medium">ชุมชน</span>
                        </button>
                        <button onClick={() => setActiveTab('report')} className={`flex flex-col items-center gap-1 transition-all ${activeTab === 'report' ? 'text-emerald-600 scale-110' : 'text-gray-400'}`}>
                            <i className="fas fa-file-alt text-lg"></i>
                            <span className="text-[10px] font-medium">รายงาน</span>
                        </button>
                    </nav>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
