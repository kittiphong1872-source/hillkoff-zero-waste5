<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hillkoff Zero Waste Platform v3.0</title>
    
    <!-- Dependencies -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Anuphan:wght@200;300;400;500;600;700&display=swap');
        
        :root {
            --primary-dark: #14532d;
            --primary-medium: #166534;
            --primary-light: #f0fdf4;
            --accent-green: #22c55e;
            --card-shadow: 0 10px 30px -5px rgba(22, 101, 52, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Anuphan', sans-serif;
            background-color: var(--primary-light);
            color: #1f2937;
            margin: 0;
            overflow-x: hidden;
        }

        .app-container {
            max-width: 500px;
            margin: 0 auto;
            min-height: 100vh;
            background: var(--primary-light);
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        /* UI ตามภาพ Screenshot_20260512_212236_Claude_2.jpg */
        .header-section {
            background: var(--primary-dark);
            height: 180px;
            padding: 25px;
            color: white;
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
        }

        .carbon-main-card {
            background: var(--primary-medium);
            margin: -60px 15px 20px 15px;
            border-radius: 32px;
            padding: 28px;
            color: white;
            text-align: center;
            box-shadow: var(--card-shadow);
            position: relative;
            z-index: 10;
        }

        .branch-grid {
            display: grid;
            grid-template-cols: repeat(2, 1fr);
            gap: 12px;
            padding: 0 15px;
        }

        .branch-card {
            background: white;
            border-radius: 24px;
            padding: 18px;
            text-align: center;
            border: 1px solid rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .branch-card.active {
            border: 2px solid var(--accent-green);
            background: #f0fdf4;
        }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 500px;
            height: 85px;
            background: white;
            border-top: 1px solid #edf2f7;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 15px;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--primary-dark);
            border-top: 3px solid var(--primary-dark);
            padding-top: 10px;
            margin-top: -13px;
        }

        /* Floating Chat UI */
        .chat-fab {
            position: fixed;
            bottom: 105px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: var(--primary-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
            z-index: 90;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chat-window {
            position: fixed;
            bottom: 175px;
            right: 20px;
            width: 320px;
            height: 450px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            z-index: 91;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Animation */
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- Data Mockup & Configuration ---
        const BRANCHES = [
            { id: 'hq', name: 'สำนักงานใหญ่', icon: '🏢', base: 0 },
            { id: 'cp', name: 'ช้างเผือก', icon: '🐘', base: 1.265 },
            { id: 'mh', name: 'มหิดล', icon: '🎓', base: 0 },
            { id: 'pp', name: 'ป่าแพ่ง', icon: '🌿', base: 0 },
            { id: 'td', name: 'ทับเดื่อ', icon: '🌱', base: 0 },
            { id: 'rt', name: 'ราติก้า', icon: '☕', base: 0 }
        ];

        const WASTE_CATEGORIES = {
            coffee: { label: 'กากกาแฟ', factor: 0.51, color: '#713f12', icon: 'fa-coffee' },
            plastic: { label: 'พลาสติก', factor: 2.52, color: '#2563eb', icon: 'fa-bottle-water' },
            paper: { label: 'กระดาษ', factor: 1.58, color: '#f59e0b', icon: 'fa-file-lines' },
            organic: { label: 'ขยะอินทรีย์', factor: 0.19, color: '#16a34a', icon: 'fa-leaf' }
        };

        // --- Components ---

        const App = () => {
            const [view, setView] = useState('home');
            const [user, setUser] = useState({ name: 'Admin', branch: 'ช้างเผือก' });
            const [logs, setLogs] = useState([]);
            const [chatOpen, setChatOpen] = useState(false);
            const [isLoading, setIsLoading] = useState(true);

            // Load Initial Data
            useEffect(() => {
                const savedLogs = localStorage.getItem('hk_logs_v3');
                if (savedLogs) setLogs(JSON.parse(savedLogs));
                setTimeout(() => setIsLoading(false), 1000);
            }, []);

            // Save Data
            useEffect(() => {
                localStorage.setItem('hk_logs_v3', JSON.stringify(logs));
            }, [logs]);

            const totalCarbon = useMemo(() => {
                const sum = logs.reduce((acc, curr) => acc + parseFloat(curr.carbon), 1.26);
                return sum.toFixed(3);
            }, [logs]);

            const handleAddLog = (newEntry) => {
                setLogs(prev => [...prev, { ...newEntry, id: Date.now(), timestamp: new Date() }]);
                Swal.fire({
                    title: 'บันทึกสำเร็จ!',
                    text: `ลด CO2 ได้ ${newEntry.carbon} kg`,
                    icon: 'success',
                    confirmButtonColor: '#14532d'
                });
                setView('home');
            };

            if (isLoading) return <LoadingScreen />;

            return (
                <div className="app-container">
                    {/* UI Header ตามไฟล์ Screenshot_20260512_212236_Claude_2.jpg */}
                    <header className="header-section flex justify-between items-start">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-white rounded-full flex items-center justify-center overflow-hidden shadow-lg">
                                <img src="https://api.dicebear.com/7.x/initials/svg?seed=Hillkoff&backgroundColor=14532d" alt="logo" />
                            </div>
                            <div>
                                <h1 className="text-xl font-bold tracking-tight">Hillkoff</h1>
                                <p className="text-[10px] uppercase opacity-60 font-medium tracking-widest">Zero Waste · ESG Platform</p>
                            </div>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] opacity-60 font-bold uppercase">CO₂e รวม</p>
                            <p className="text-3xl font-black">{totalCarbon} <span className="text-sm font-light">kg</span></p>
                        </div>
                    </header>

                    {/* Dashboard Card */}
                    <section className="carbon-main-card">
                        <p className="text-xs font-semibold opacity-80 mb-2">🌍 Carbon Footprint — องค์กร</p>
                        <h2 className="text-5xl font-black mb-6 tracking-tighter">
                            {totalCarbon} <span className="text-xl font-medium">kg CO₂e</span>
                        </h2>
                        
                        <div className="flex justify-center gap-2 mb-8">
                            {['ISO 14064', 'GHG Protocol', 'WEEE', 'SDG 12'].map(tag => (
                                <span key={tag} className="bg-white/15 px-3 py-1 rounded-full text-[9px] font-bold border border-white/10">{tag}</span>
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-1 bg-black/15 rounded-3xl p-5 mb-8">
                            <StatItem label="kg วันนี้" value="1.265" />
                            <StatItem label="kg เดือนนี้" value={totalCarbon} border />
                            <StatItem label="รายการ" value={logs.length + 1} />
                        </div>

                        <button 
                            onClick={() => setView('camera')}
                            className="bg-white text-green-900 font-black px-10 py-4 rounded-full shadow-2xl active:scale-95 transition-transform flex items-center gap-3 mx-auto"
                        >
                            <i className="fas fa-camera text-lg"></i>
                            บันทึกขยะใหม่
                        </button>
                    </section>

                    {/* View Switcher */}
                    <main className="pb-32">
                        {view === 'home' && <HomeView logs={logs} user={user} />}
                        {view === 'record' && <HistoryView logs={logs} />}
                        {view === 'analytics' && <AnalyticsView logs={logs} />}
                        {view === 'ranking' && <RankingView logs={logs} />}
                        {view === 'report' && <ReportView logs={logs} />}
                        {view === 'camera' && <CameraSystem onSave={handleAddLog} onCancel={() => setView('home')} />}
                    </main>

                    {/* Chat System */}
                    <div className="chat-fab" onClick={() => setChatOpen(!chatOpen)}>
                        <i className={`fas ${chatOpen ? 'fa-xmark' : 'fa-comment-dots'} text-2xl`}></i>
                    </div>
                    {chatOpen && <ChatWindow user={user} />}

                    {/* Bottom Navigation */}
                    <nav className="bottom-nav">
                        <NavItem active={view === 'home'} icon="fa-house" label="หน้าหลัก" onClick={() => setView('home')} />
                        <NavItem active={view === 'record'} icon="fa-file-signature" label="บันทึก" onClick={() => setView('record')} />
                        <NavItem active={view === 'analytics'} icon="fa-chart-pie" label="Analytics" onClick={() => setView('analytics')} />
                        <NavItem active={view === 'ranking'} icon="fa-trophy" label="Ranking" onClick={() => setView('ranking')} />
                        <NavItem active={view === 'report'} icon="fa-file-invoice" label="รายงาน" onClick={() => setView('report')} />
                    </nav>
                </div>
            );
        };

        // --- Sub-Components ---

        const NavItem = ({ active, icon, label, onClick }) => (
            <div className={`nav-item ${active ? 'active' : ''}`} onClick={onClick}>
                <i className={`fas ${icon} text-xl`}></i>
                <span>{label}</span>
            </div>
        );

        const StatItem = ({ label, value, border }) => (
            <div className={border ? "border-x border-white/10 px-2" : ""}>
                <p className="text-[9px] opacity-60 font-bold uppercase mb-1">{label}</p>
                <p className="text-xl font-black">{value}</p>
            </div>
        );

        const HomeView = ({ logs, user }) => (
            <div className="fade-in">
                <div className="px-5 mb-4 flex justify-between items-center">
                    <h3 className="text-sm font-black text-green-900 uppercase tracking-widest">สรุปแต่ละสาขา</h3>
                    <span className="text-[10px] text-gray-400 font-bold">อัปเดตล่าสุด: เมื่อครู่</span>
                </div>
                <div className="branch-grid">
                    {BRANCHES.map(branch => {
                        const branchLogs = logs.filter(l => l.branch === branch.name);
                        const currentVal = branchLogs.reduce((s, l) => s + parseFloat(l.carbon), branch.base).toFixed(3);
                        return (
                            <div key={branch.id} className={`branch-card ${branch.name === user.branch ? 'active' : ''}`}>
                                <div className="text-3xl mb-3">{branch.icon}</div>
                                <h4 className="font-bold text-sm text-gray-800 mb-1">{branch.name}</h4>
                                <p className="text-[10px] text-gray-400 font-medium mb-3">{branchLogs.length + (branch.base > 0 ? 1 : 0)} รายการ</p>
                                <div className={`text-xl font-black ${parseFloat(currentVal) > 0 ? 'text-green-600' : 'text-gray-300'}`}>
                                    {currentVal} <span className="text-[10px] font-bold">kg</span>
                                </div>
                            </div>
                        );
                    })}
                </div>
            </div>
        );

        const CameraSystem = ({ onSave, onCancel }) => {
            const videoRef = useRef(null);
            const [mode, setMode] = useState('scan'); // scan | confirm
            const [photo, setPhoto] = useState(null);
            const [weight, setWeight] = useState('');
            const [type, setType] = useState('coffee');

            useEffect(() => {
                if (mode === 'scan') startCamera();
                return () => stopCamera();
            }, [mode]);

            const startCamera = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    Swal.fire('กล้องมีปัญหา', 'กรุณาอนุญาตการเข้าถึงกล้อง', 'error');
                    onCancel();
                }
            };

            const stopCamera = () => {
                if (videoRef.current?.srcObject) {
                    videoRef.current.srcObject.getTracks().forEach(t => t.stop());
                }
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                setPhoto(canvas.toDataURL('image/jpeg'));
                setMode('confirm');
            };

            if (mode === 'confirm') {
                const carbonVal = (parseFloat(weight || 0) * WASTE_CATEGORIES[type].factor).toFixed(2);
                return (
                    <div className="fixed inset-0 bg-white z-[200] overflow-y-auto p-6">
                        <h2 className="text-2xl font-black text-green-900 mb-6">ยืนยันข้อมูลขยะ</h2>
                        <div className="rounded-3xl overflow-hidden mb-6 shadow-xl border-4 border-white">
                            <img src={photo} className="w-full aspect-video object-cover" />
                        </div>
                        
                        <div className="space-y-6">
                            <div>
                                <label className="text-xs font-black text-gray-400 uppercase mb-3 block">ประเภทขยะ</label>
                                <div className="grid grid-cols-2 gap-3">
                                    {Object.entries(WASTE_CATEGORIES).map(([key, val]) => (
                                        <button 
                                            key={key} 
                                            onClick={() => setType(key)}
                                            className={`p-4 rounded-2xl border-2 flex items-center gap-3 transition-all ${type === key ? 'border-green-600 bg-green-50' : 'border-gray-100'}`}
                                        >
                                            <i className={`fas ${val.icon} ${type === key ? 'text-green-600' : 'text-gray-300'}`}></i>
                                            <span className={`text-xs font-bold ${type === key ? 'text-green-900' : 'text-gray-500'}`}>{val.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div>
                                <label className="text-xs font-black text-gray-400 uppercase mb-3 block">น้ำหนัก (กิโลกรัม)</label>
                                <input 
                                    type="number" 
                                    value={weight} 
                                    onChange={(e) => setWeight(e.target.value)}
                                    placeholder="0.00"
                                    className="w-full p-5 rounded-3xl bg-gray-50 border border-gray-100 text-4xl font-black text-center text-green-900 outline-none focus:ring-4 ring-green-100 transition-all"
                                />
                            </div>

                            <div className="bg-green-900 p-6 rounded-3xl text-white text-center shadow-2xl">
                                <p className="text-[10px] font-bold opacity-60 uppercase mb-1">Carbon Saved Estimation</p>
                                <p className="text-4xl font-black">{carbonVal} <span className="text-sm font-normal">kg CO₂e</span></p>
                            </div>

                            <div className="flex gap-4">
                                <button onClick={() => setMode('scan')} className="flex-1 py-5 font-bold text-gray-400">ยกเลิก</button>
                                <button 
                                    onClick={() => onSave({ type, weight, carbon: carbonVal, branch: 'ช้างเผือก' })}
                                    className="flex-[2] bg-green-600 text-white py-5 rounded-3xl font-black shadow-lg"
                                >
                                    ส่งข้อมูล
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black z-[200] flex flex-direction-column">
                    <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover opacity-80" />
                    <div className="absolute inset-0 pointer-events-none flex flex-col items-center justify-center">
                        <div className="w-64 h-64 border-2 border-white/50 rounded-3xl relative">
                            <div className="absolute inset-[-2px] border-4 border-green-500 rounded-3xl animate-pulse"></div>
                        </div>
                        <p className="text-white mt-8 font-bold tracking-widest text-sm bg-black/40 px-6 py-2 rounded-full">สแกนวัตถุ / ถุงขยะ</p>
                    </div>
                    <div className="absolute bottom-12 left-0 right-0 flex justify-around items-center px-10">
                        <button onClick={onCancel} className="text-white text-2xl"><i className="fas fa-arrow-left"></i></button>
                        <button onClick={capture} className="w-20 h-20 rounded-full border-4 border-white bg-white/20 flex items-center justify-center">
                            <div className="w-14 h-14 bg-white rounded-full"></div>
                        </button>
                        <div className="w-8"></div>
                    </div>
                </div>
            );
        };

        const RankingView = ({ logs }) => {
            const data = BRANCHES.map(b => {
                const bLogs = logs.filter(l => l.branch === b.name);
                const carbon = bLogs.reduce((s, l) => s + parseFloat(l.carbon), b.base);
                return { ...b, carbon };
            }).sort((a, b) => b.carbon - a.carbon);

            return (
                <div className="px-5 fade-in">
                    <div className="flex items-center gap-3 mb-8">
                        <div className="w-12 h-12 bg-yellow-400 rounded-2xl flex items-center justify-center text-white text-2xl shadow-lg">
                            <i className="fas fa-trophy"></i>
                        </div>
                        <div>
                            <h3 className="text-xl font-black text-green-900">อันดับสาขา</h3>
                            <p className="text-xs text-gray-400 font-bold">ผู้นำด้านการลด Carbon ประจำเดือน</p>
                        </div>
                    </div>

                    <div className="space-y-4">
                        {data.map((item, index) => (
                            <div key={item.id} className="bg-white p-5 rounded-3xl flex items-center gap-5 shadow-sm border border-gray-100">
                                <div className={`text-2xl font-black ${index === 0 ? 'text-yellow-500' : index === 1 ? 'text-gray-400' : 'text-orange-400'}`}>
                                    #{index + 1}
                                </div>
                                <div className="text-2xl">{item.icon}</div>
                                <div className="flex-1">
                                    <h4 className="font-bold text-gray-800">{item.name}</h4>
                                    <div className="w-full h-1.5 bg-gray-100 rounded-full mt-2 overflow-hidden">
                                        <div 
                                            className="h-full bg-green-500 rounded-full" 
                                            style={{ width: `${(item.carbon / data[0].carbon) * 100}%` }}
                                        ></div>
                                    </div>
                                </div>
                                <div className="text-right">
                                    <p className="text-lg font-black text-green-700">{item.carbon.toFixed(2)}</p>
                                    <p className="text-[9px] font-bold text-gray-400 uppercase">KG CO₂e</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const HistoryView = ({ logs }) => (
            <div className="px-5 fade-in">
                <h3 className="text-xl font-black text-green-900 mb-6">ประวัติการบันทึก</h3>
                <div className="space-y-3">
                    {logs.length === 0 && <p className="text-center py-20 text-gray-300 font-bold">ยังไม่มีข้อมูลใหม่</p>}
                    {logs.slice().reverse().map(log => (
                        <div key={log.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border-l-4 border-green-600 shadow-sm">
                            <div className="flex items-center gap-4">
                                <div className="w-10 h-10 bg-green-50 rounded-xl flex items-center justify-center text-green-600">
                                    <i className={`fas ${WASTE_CATEGORIES[log.type].icon}`}></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-sm">{WASTE_CATEGORIES[log.type].label}</h4>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase">{log.branch} • {new Date(log.timestamp).toLocaleDateString('th-TH')}</p>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="font-black text-green-600">-{log.carbon} kg</p>
                                <p className="text-[8px] text-gray-400 font-bold">REDUCED</p>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const AnalyticsView = ({ logs }) => {
            useEffect(() => {
                const ctx = document.getElementById('carbonChart');
                if (ctx) {
                    new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['จ.', 'อ.', 'พ.', 'พฤ.', 'ศ.', 'ส.', 'อา.'],
                            datasets: [{
                                label: 'Carbon Saved',
                                data: [12, 19, 15, 25, 22, 30, 45],
                                borderColor: '#16a34a',
                                tension: 0.4,
                                fill: true,
                                backgroundColor: 'rgba(22, 163, 74, 0.1)'
                            }]
                        },
                        options: {
                            plugins: { legend: { display: false } },
                            scales: { y: { display: false }, x: { grid: { display: false } } }
                        }
                    });
                }
            }, []);

            return (
                <div className="px-5 fade-in">
                    <h3 className="text-xl font-black text-green-900 mb-6">วิเคราะห์ผลกระทบ</h3>
                    <div className="bg-white p-6 rounded-[2rem] shadow-sm mb-6">
                        <canvas id="carbonChart" height="200"></canvas>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-blue-600 p-5 rounded-3xl text-white">
                            <i className="fas fa-tree text-2xl mb-3"></i>
                            <p className="text-[10px] font-bold opacity-60 uppercase">เทียบเท่าปลูกต้นไม้</p>
                            <p className="text-3xl font-black">12 <span className="text-sm">ต้น</span></p>
                        </div>
                        <div className="bg-orange-500 p-5 rounded-3xl text-white">
                            <i className="fas fa-car-side text-2xl mb-3"></i>
                            <p className="text-[10px] font-bold opacity-60 uppercase">ระยะทางรถวิ่ง</p>
                            <p className="text-3xl font-black">84 <span className="text-sm">km</span></p>
                        </div>
                    </div>
                </div>
            );
        };

        const ReportView = () => (

                <h3 className="text-xl font-black text-green-900 mb-6">รายงานประจำเดือน</h3>
                <div className="space-y-4">
                    {[1, 2, 3].map(m => (
                        <div key={m} className="bg-white p-5 rounded-3xl border border-gray-100 flex justify-between items-center">
                            <div className="flex items-center gap-4">
                                <div className="w-12 h-12 bg-gray-50 rounded-2xl flex items-center justify-center text-green-800">
                                    <i className="fas fa-file-pdf text-xl"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold">รายงาน ESG เดือน 0{m}/2026</h4>
                                    <p className="text-[10px] text-gray-400 font-bold uppercase">PDF · 2.4 MB · 12/0{m}/26</p>
                                </div>
                            </div>
                            <button className="w-10 h-10 rounded-full bg-green-50 text-green-600 flex items-center justify-center">
                                <i className="fas fa-download"></i>
                            </button>
                        </div>
                    ))}
                </div>
            </div>
        );

        const ChatWindow = ({ user }) => (
            <div className="chat-window shadow-2xl flex flex-col">
                <div className="bg-green-900 p-4 text-white flex justify-between items-center">
                    <div className="flex items-center gap-2">
                        <div className="w-2 h-2 bg-green-400 rounded-full animate-ping"></div>
                        <span className="font-bold text-sm">ฝ่ายสนับสนุน ESG</span>
                    </div>
                    <i className="fas fa-headset"></i>
                </div>
                <div className="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50">
                    <div className="flex gap-2">
                        <div className="w-8 h-8 rounded-full bg-green-100 flex items-center justify-center text-[10px] font-bold">ST</div>
                        <div className="bg-white p-3 rounded-2xl rounded-tl-none shadow-sm text-xs border border-gray-100 max-w-[80%]">
                            สวัสดีคุณ {user.name} จากสาขา {user.branch} มีข้อมูลส่วนไหนต้องการให้ตรวจสอบเพิ่มเติมไหมครับ?
                        </div>
                    </div>
                    <div className="flex flex-row-reverse gap-2">
                        <div className="bg-green-600 p-3 rounded-2xl rounded-tr-none shadow-sm text-xs text-white max-w-[80%]">
                            ต้องการแจ้งปรับค่าน้ำหนักกากกาแฟของเมื่อวานครับ
                        </div>
                    </div>
                </div>
                <div className="p-4 border-t bg-white flex gap-2">
                    <input className="flex-1 bg-gray-100 rounded-full px-4 py-2 text-xs outline-none focus:ring-2 ring-green-100" placeholder="พิมพ์ข้อความ..." />
                    <button className="bg-green-900 w-10 h-10 rounded-full text-white flex items-center justify-center shadow-lg">
                        <i className="fas fa-paper-plane text-xs"></i>
                    </button>
                </div>
            </div>
        );

        const LoadingScreen = () => (
            <div className="app-container flex flex-col items-center justify-center bg-green-900 text-white p-10 text-center">
                <div className="w-24 h-24 border-4 border-green-400 border-t-transparent rounded-full animate-spin mb-8"></div>
                <h2 className="text-3xl font-black mb-2 uppercase tracking-tighter">Hillkoff</h2>
                <p className="text-xs font-bold text-green-400 tracking-[0.4em] uppercase">ESG Platform Loading</p>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
